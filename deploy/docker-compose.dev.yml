# Local PostgreSQL only: docker compose -f deploy/docker-compose.dev.yml up -d
services:
  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: novalink
      POSTGRES_PASSWORD: novalink
      POSTGRES_DB: novalink
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

volumes:
  pgdata_dev:
