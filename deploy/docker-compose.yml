# Vultr app server — API + PostgreSQL
# Usage: cd deploy && docker compose --env-file .env up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-novalink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-novalink}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-novalink}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
