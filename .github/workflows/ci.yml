name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend
        run: npm ci

      - name: Build Mini App
        run: npm run build
        env:
          VITE_API_BASE_URL: https://novalink-api.onrender.com

      - name: Install API
        working-directory: server
        run: npm ci

      - name: Verify API starts
        working-directory: server
        env:
          SKIP_DOTENV: "1"
          DATABASE_URL: postgresql://u:p@127.0.0.1:5432/x
          VPN_DEMO_MODE: "1"
          PUBLIC_API_URL: http://localhost:3000
        run: node -e "import('./src/config.js').then(m => m.assertConfig())"
