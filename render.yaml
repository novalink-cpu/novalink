# Render Blueprint — https://dashboard.render.com/select-repo?type=blueprint
# Repo branch: master (Render Dashboard → Settings မှာလည်း master ရွေးပါ)

databases:
  - name: novalink-db
    databaseName: novalink
    user: novalink
    plan: free

services:
  # Node API + Telegram webhook + ssconf JSON
  - type: web
    name: novalink-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: novalink-db
          property: connectionString
      - key: PUBLIC_API_URL
        fromService:
          type: web
          name: novalink-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: TELEGRAM_WEBHOOK_URL
        fromService:
          type: web
          name: novalink-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: APP_PUBLIC_URL
        fromService:
          type: web
          name: novalink-app
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: novalink-app
          envVarKey: RENDER_EXTERNAL_URL
      - key: VPN_DEMO_MODE
        value: "0"
      - key: VPN_USE_SSCONF
        value: "1"
      - key: TRUST_PROXY
        value: "1"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_IDS
        sync: false
      - key: ADMIN_ACTION_SECRET
        generateValue: true
      - key: OUTLINE_SG_API_URL
        sync: false
      - key: OUTLINE_SG_CERT_SHA256
        sync: false
      - key: OUTLINE_JP_API_URL
        sync: false
      - key: OUTLINE_JP_CERT_SHA256
        sync: false
      - key: OUTLINE_AU_API_URL
        sync: false
      - key: OUTLINE_AU_CERT_SHA256
        sync: false

  # Telegram Mini App (static)
  - type: web
    name: novalink-app
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: novalink-api
          envVarKey: RENDER_EXTERNAL_URL
